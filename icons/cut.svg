<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cubeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="topGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sideGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0c0c0;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" flood-color="#000000" flood-opacity="0.15" stdDeviation="2"/>
    </filter>
  </defs>
  
  <!-- Main cube body -->
  <path d="M 12 20 L 36 20 L 36 44 L 12 44 Z" fill="url(#cubeGradient)" rx="1" filter="url(#dropShadow)"/>
  
  <!-- Top face -->
  <path d="M 12 20 L 24 8 L 48 8 L 36 20 Z" fill="url(#topGradient)" rx="1"/>
  
  <!-- Right face -->
  <path d="M 36 20 L 48 8 L 48 32 L 36 44 Z" fill="url(#sideGradient)" rx="1"/>
  
  <!-- Cut-out section (red accent) -->
  <rect x="20" y="28" width="12" height="8" fill="#ff4444" rx="1" opacity="0.9"/>
  
  <!-- Cut-out depth indicator -->
  <path d="M 32 28 L 38 22 L 38 30 L 32 36 Z" fill="#cc3333" rx="0.5"/>
  
  <!-- Inner cut surfaces -->
  <rect x="20" y="28" width="12" height="1" fill="#aa2222" rx="0.5"/>
  <rect x="20" y="28" width="1" height="8" fill="#dd5555" rx="0.5"/>
</svg>