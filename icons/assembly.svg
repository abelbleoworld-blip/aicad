<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="part1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E55353;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="part2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3BB5AD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="part3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD93D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5C842;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Main central hub -->
  <circle cx="32" cy="32" r="8" fill="url(#mainGrad)" filter="url(#shadow)"/>
  
  <!-- Part 1 - Top left -->
  <rect x="8" y="8" width="12" height="12" rx="3" fill="url(#part1Grad)" filter="url(#shadow)"/>
  <line x1="20" y1="14" x2="24" y2="26" stroke="#666" stroke-width="2" opacity="0.6"/>
  
  <!-- Part 2 - Top right -->
  <circle cx="50" cy="14" r="6" fill="url(#part2Grad)" filter="url(#shadow)"/>
  <line x1="44" y1="14" x2="40" y2="26" stroke="#666" stroke-width="2" opacity="0.6"/>
  
  <!-- Part 3 - Bottom left -->
  <polygon points="8,44 20,44 14,56" fill="url(#part3Grad)" filter="url(#shadow)"/>
  <line x1="14" y1="44" x2="26" y2="38" stroke="#666" stroke-width="2" opacity="0.6"/>
  
  <!-- Part 4 - Bottom right -->
  <rect x="44" y="44" width="12" height="12" rx="6" fill="url(#part1Grad)" filter="url(#shadow)"/>
  <line x1="44" y1="50" x2="38" y2="38" stroke="#666" stroke-width="2" opacity="0.6"/>
  
  <!-- Connection points on central hub -->
  <circle cx="28" cy="28" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="36" cy="28" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="28" cy="36" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="36" cy="36" r="1.5" fill="#fff" opacity="0.8"/>
</svg>