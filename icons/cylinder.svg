<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cylinderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8DCF2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="topGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F9FC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D0E7F7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bottomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A8D1EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7BB8DD;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feFlood flood-color="#000000" flood-opacity="0.15"/>
      <feComposite in2="offset" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Cylinder body -->
  <rect x="16" y="20" width="32" height="24" rx="2" ry="2" fill="url(#cylinderGradient)" filter="url(#dropShadow)"/>
  
  <!-- Top ellipse -->
  <ellipse cx="32" cy="20" rx="16" ry="6" fill="url(#topGradient)" filter="url(#dropShadow)"/>
  
  <!-- Bottom ellipse -->
  <ellipse cx="32" cy="44" rx="16" ry="6" fill="url(#bottomGradient)"/>
  
  <!-- Highlight on cylinder -->
  <rect x="18" y="22" width="2" height="20" rx="1" fill="#FFFFFF" opacity="0.4"/>
</svg>