<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="diskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0"/>
      <stop offset="100%" style="stop-color:#d0d0d0"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8e8e8"/>
    </linearGradient>
    <linearGradient id="slotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Main disk body -->
  <rect x="12" y="8" width="40" height="40" rx="4" ry="4" fill="url(#diskGrad)" filter="url(#shadow)"/>
  
  <!-- Top notch -->
  <polygon points="44,8 52,16 52,20 44,20" fill="url(#diskGrad)"/>
  
  <!-- Label area -->
  <rect x="16" y="22" width="32" height="22" rx="2" ry="2" fill="url(#labelGrad)"/>
  
  <!-- Write slot -->
  <rect x="44" y="12" width="6" height="2" rx="1" ry="1" fill="url(#slotGrad)"/>
  
  <!-- Center circle -->
  <circle cx="32" cy="32" r="3" fill="#666"/>
  <circle cx="32" cy="32" r="1.5" fill="#333"/>
</svg>