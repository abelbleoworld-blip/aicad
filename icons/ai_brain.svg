<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#81D4FA;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Shadow base -->
  <ellipse cx="32" cy="54" rx="20" ry="4" fill="#000000" opacity="0.1"/>
  
  <!-- Main brain shape -->
  <path d="M20 28C18 22 22 18 26 18C28 16 32 16 34 18C36 16 40 16 42 18C46 18 50 22 48 28C50 30 50 34 48 36C50 38 48 42 44 42C42 44 38 44 36 42C34 44 30 44 28 42C24 42 22 38 24 36C22 34 22 30 24 28C22 30 20 30 20 28Z" fill="url(#brainGradient)" filter="url(#shadow)"/>
  
  <!-- Brain hemisphere division -->
  <path d="M32 18C32 20 32 24 32 42" stroke="#1976D2" stroke-width="1" opacity="0.3" fill="none"/>
  
  <!-- Circuit connections -->
  <circle cx="26" cy="26" r="1.5" fill="#81D4FA" filter="url(#glow)"/>
  <circle cx="38" cy="26" r="1.5" fill="#81D4FA" filter="url(#glow)"/>
  <circle cx="30" cy="32" r="1.5" fill="#81D4FA" filter="url(#glow)"/>
  <circle cx="34" cy="32" r="1.5" fill="#81D4FA" filter="url(#glow)"/>
  <circle cx="28" cy="38" r="1.5" fill="#81D4FA" filter="url(#glow)"/>
  <circle cx="36" cy="38" r="1.5" fill="#81D4FA" filter="url(#glow)"/>
  
  <!-- Circuit lines -->
  <path d="M26 26L30 32M38 26L34 32M30 32L28 38M34 32L36 38" stroke="#81D4FA" stroke-width="1" opacity="0.7" fill="none" filter="url(#glow)"/>
  
  <!-- Highlight -->
  <ellipse cx="28" cy="24" rx="4" ry="2" fill="#FFFFFF" opacity="0.3"/>
</svg>