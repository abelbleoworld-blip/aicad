<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="topGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8d3e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dfe6ed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9fb3c8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8c5d1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chamferGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e1e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c1d0df;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <g filter="url(#shadow)">
    <!-- Cube back faces (subtle) -->
    <path d="M16 20 L32 12 L48 20 L48 36 L32 44 L16 36 Z" fill="#d6dde4" opacity="0.3"/>
    
    <!-- Main cube top face -->
    <path d="M14 24 L30 16 L46 24 L46 32 L38 28 L30 32 L22 28 L14 32 Z" fill="url(#topGrad)"/>
    
    <!-- Main cube left face -->
    <path d="M14 24 L14 40 L22 44 L22 28 L30 32 L30 48 L14 40" fill="url(#leftGrad)"/>
    
    <!-- Main cube right face -->
    <path d="M30 32 L46 24 L46 40 L30 48 Z" fill="url(#rightGrad)"/>
    
    <!-- Chamfered edge -->
    <path d="M22 28 L30 32 L30 48 L22 44 Z" fill="url(#chamferGrad)"/>
    
    <!-- Highlight edge -->
    <path d="M22 28 L30 32" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.6"/>
  </g>
</svg>