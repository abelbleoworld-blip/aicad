<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8B8B8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="holeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A2A2A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cylinderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7A7A7A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5A5A5A;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main block -->
  <rect x="12" y="20" width="40" height="24" rx="2" ry="2" fill="url(#blockGradient)" filter="url(#dropShadow)"/>
  
  <!-- Cylinder hole through block -->
  <ellipse cx="32" cy="32" rx="8" ry="8" fill="url(#holeGradient)"/>
  
  <!-- Cylinder extending beyond block -->
  <rect x="28" y="10" width="8" height="8" fill="url(#cylinderGradient)" rx="4" ry="4"/>
  <rect x="28" y="46" width="8" height="8" fill="url(#cylinderGradient)" rx="4" ry="4"/>
  
  <!-- Highlight on hole edge -->
  <ellipse cx="32" cy="32" rx="8" ry="8" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.6"/>
</svg>