<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cubeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1d1d6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="topGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e5ea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e5e5ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c7c7cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007aff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0056cc;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Drop shadow -->
  <g filter="url(#dropShadow)">
    <!-- Main cube faces -->
    <!-- Left face -->
    <path d="M12 20 L12 44 L28 52 L28 28 Z" fill="url(#cubeGradient)" stroke="none"/>
    
    <!-- Top face -->
    <path d="M12 20 Q18 18 28 28 L44 28 Q50 22 52 20 L36 12 Q30 14 28 16 Q22 18 12 20 Z" fill="url(#topGradient)" stroke="none"/>
    
    <!-- Right face -->
    <path d="M28 28 L28 52 L44 44 L44 20 Q50 22 52 20 L52 44 L36 52 L36 28 Q30 30 28 28 Z" fill="url(#rightGradient)" stroke="none"/>
    
    <!-- Highlighted rounded edge -->
    <path d="M28 16 Q30 14 36 12 L36 36 Q30 38 28 40 L28 28 Q30 26 28 28 Q26 26 28 16 Z" fill="url(#highlightGradient)" stroke="none"/>
  </g>
</svg>