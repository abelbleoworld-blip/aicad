<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lensGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2a2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerLensGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="reflectionGradient" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" flood-opacity="0.2" flood-color="#000000" stdDeviation="2"/>
    </filter>
  </defs>
  
  <!-- Body shadow -->
  <rect x="8" y="21" width="48" height="32" rx="4" fill="#000000" opacity="0.1" transform="translate(0,1)"/>
  
  <!-- Camera body -->
  <rect x="8" y="20" width="48" height="32" rx="4" fill="url(#bodyGradient)" filter="url(#shadow)"/>
  
  <!-- Viewfinder -->
  <rect x="20" y="16" width="8" height="6" rx="1" fill="url(#bodyGradient)"/>
  
  <!-- Flash -->
  <circle cx="44" cy="26" r="2" fill="#ffffff" opacity="0.8"/>
  
  <!-- Lens outer ring -->
  <circle cx="32" cy="36" r="14" fill="url(#lensGradient)"/>
  
  <!-- Lens inner -->
  <circle cx="32" cy="36" r="10" fill="url(#innerLensGradient)"/>
  
  <!-- Lens reflection -->
  <circle cx="32" cy="36" r="10" fill="url(#reflectionGradient)"/>
  
  <!-- Center lens element -->
  <circle cx="32" cy="36" r="6" fill="#0a0a0a"/>
  
  <!-- Lens highlight -->
  <ellipse cx="29" cy="33" rx="2" ry="3" fill="#ffffff" opacity="0.15"/>
</svg>